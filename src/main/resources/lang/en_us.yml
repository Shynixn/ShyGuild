shyGuildTemplateListMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Templates:"
shyGuildWordNotAllowedMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c The text contains invalid words, is too short or too long. Please make sure to follow the rules and try again."
shyGuildCreateCommandHint:
  type: "CHAT"
  text: "Creates a new guild with the given name based on the given template."
shyGuildCreateSuccessMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Successfully created guild %shyguild_param_1%."
shyGuildAlreadyExistsMessage:
  type: "CHAT"
