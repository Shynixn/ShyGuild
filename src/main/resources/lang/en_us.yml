shyGuildDeleteSuccessMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Successfully deleted guild %shyguild_param_1%."
shyGuildMemberAddCommandHint:
  type: "CHAT"
  text: "Adds a player directly to the given guild. Should only be used for administrative purposes."
shyGuildMemberAddSuccessMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Successfully added player %shyguild_param_1% to guild %shyguild_param_2%."
