shyGuildAddRoleCommandHint:
  type: "CHAT"
  text: "Assigns the given role to the given player in the given guild."
shyGuildRemoveRoleCommandHint:
  type: "CHAT"
  text: "Removes the given role from the given player in the given guild."
shyGuildListRolesCommandHint:
  type: "CHAT"
  text: "Lists all roles of the given guild or the roles of a single player in the given guild."
shyGuildPlayerNotAMemberMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c Player %shyguild_param_1% is not a member of this guild."
shyGuildAssignRoleSuccessMessage:
  type: "CHAT"
