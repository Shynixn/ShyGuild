# All language key identifiers.
shyGuildPlayerNotFoundMessage:
  # Available types: "CHAT", "TITLE", "ACTIONBAR", "HIDDEN".
  # Please notice that some messages do only support chat.
  type: "CHAT"
  # The primary text to be sent.
  text: "[&9ShyGuild&f] &cPlayer %shyguild_param_1% not found."
  # Only available for type "TITLE". Adds a subTitle.
  subTitle: ""
  # Only available for type: "TITLE". Adds a fade in effect.
  fadeInTicks: 20
  # Only available for type: "TITLE". Adds a stay effect.
  stayTicks: 60
  # Only available for type: "TITLE". Adds a fade out effect.
  fadeOutTicks: 20
shyGuildNoPermissionCommand:
  type: "CHAT"
  text: "[&9ShyGuild&f] &cYou do not have permission to execute this command."
shyGuildReloadCommandHint:
  type: "CHAT"
  text: "Reloads all guilds and configuration."
shyGuildReloadMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Reloaded all guilds and configuration."
shyGuildCommonErrorMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c A problem occurred. Check the console log for details."
shyGuildCommandSenderHasToBePlayer:
  type: "CHAT"
  text: "[&9ShyGuild&f] The command sender has to be a player if you do not specify the optional player argument."
shyGuildCommandUsage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Use /shyguild help to see more info about the plugin."
shyGuildCommandDescription:
  type: "CHAT"
  text: "[&9ShyGuild&f] All commands for the ShyGuild plugin."
shyGuildTemplateListCommandHint:
  type: "CHAT"
  text: "Displays all loaded guild templates."
shyGuildTemplateListMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Templates:"
shyGuildWordNotAllowedMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c The text contains invalid words, is too short or too long. Please make sure to follow the rules and try again."
shyGuildCreateCommandHint:
  type: "CHAT"
  text: "Creates a new guild with the given name based on the given template."
shyGuildCreateSuccessMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Successfully created guild %shyguild_param_1%."
shyGuildAlreadyExistsMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c A guild with the name %shyguild_param_1% already exists."
shyGuildTemplateNotFoundMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c Guild template %shyguild_param_1% not found."
shyGuildNoPermissionTemplateMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c You do not have permission to use guild template %shyguild_param_1%."
shyGuildGuildNotFoundMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c Guild %shyguild_param_1% not found."
shyGuildRoleNotFoundMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c Role %shyguild_param_1% not found in guild %shyguild_param_2%."
shyGuildNoPermissionRoleMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c You do not have permission to assign role %shyguild_param_1%."
shyGuildAddRoleCommandHint:
  type: "CHAT"
  text: "Assigns the given role to the given player in the given guild."
shyGuildRemoveRoleCommandHint:
  type: "CHAT"
  text: "Removes the given role from the given player in the given guild."
shyGuildListRolesCommandHint:
  type: "CHAT"
  text: "Lists all roles of the given guild or the roles of a single player in the given guild."
shyGuildPlayerNotAMemberMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f]&c Player %shyguild_param_1% is not a member of this guild."
shyGuildAssignRoleSuccessMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Successfully assigned role %shyguild_param_1% to player %shyguild_param_2%."
shyGuildRemoveRoleSuccessMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Successfully removed role %shyguild_param_1% from player %shyguild_param_2%."
shyGuildRoleListAllMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] All roles of this guild:"
shyGuildRoleListPlayerMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] All roles of player %shyguild_param_1%:"
shyGuildDeleteCommandHint:
  type: "CHAT"
  text: "Deletes the given guild."
shyGuildDeleteSuccessMessage:
  type: "CHAT"
  text: "[&9ShyGuild&f] Successfully deleted guild %shyguild_param_1%."