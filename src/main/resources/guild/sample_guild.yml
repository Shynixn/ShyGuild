# Unique identifier of a guild template.
name: "sample_guild"
# Maximum amount of players that can be in a guild created from this template.
maxPlayers: 10
# Allow players to be in multiple guilds at the same time. If false, players can only be in one guild of this guild tempalte at a time.
joinMultiple: false
# A list of roles that players in a guild created from this template can have. Each role has got a name and a list of permissions that are assigned to players with this role. If LuckPerms integration is enabled, the permissions support LuckPerms syntax and will be assigned to the corresponding LuckPerms group.
roles:
  - name: "Owner"
    # Permissions that are assigned to players with this role. Permissions require the plugin LuckPerms to be installed.
    allowPermissions:
      - "blockball.club.join.*" # TODO: Allow direct attaching only allow when teams are empty. Only when the owner gives permission to this guild to join another arena.
      - "shyguild.guild.%shyguild_guild_name%.delete"
      - "shyguild.guild.%shyguild_guild_name%.invite"
      - "shyguild.guild.%shyguild_guild_name%.kick"
      - "shyguild.guild.%shyguild_guild_name%.promote"
      - "shyguild.guild.%shyguild_guild_name%.demote"
    # Permissions that are denied to players with this role. Permissions require the plugin LuckPerms to be installed.
    denyPermissions: []
  - name: "Member"
    # Permissions that are assigned to players with this role. Permissions require the plugin LuckPerms to be installed.
    allowPermissions:
      - "shyguild.guild.%shyguild_guild_name%.leave"
    # Permissions that are denied to players with this role. Permissions require the plugin LuckPerms to be installed.
    denyPermissions: []