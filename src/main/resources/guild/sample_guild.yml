# Unique identifier of a guild template.
name: "sample_guild"
# Maximum amount of players that can be in a guild created from this template.
maxPlayers: 10
# The default role that players get assigned when they join a guild created from this template. This role should be defined in the list of roles below.
defaultRole: "member"
# A list of roles that players in a guild created from this template can have. Each role has got a name and a list of permissions that are assigned to players with this role.
roles:
  - name: "owner" # The role owner should always be defined. Players automatically get assigned the role 'owner' when they create a new guild. You can assign multiple roles to a single player.
    # Permissions that are assigned to players with this role. Permissions require the plugin LuckPerms to be installed.
    # A LuckPerms group is automatically created for each role of each guild. This group is fully managed by this guild plugin. Do not edit it manually and only edit this template.
    allowPermissions:
      - "shyguild.guild.%shyguild_guild_name%.delete" # Only a member of role owner can delete the guild. PlaceHolders are automatically replaced.
      - "shyguild.guild.%shyguild_guild_name%.role.add.owner" # Only a member of role owner can assign the role 'owner' to other players.
      - "shyguild.guild.%shyguild_guild_name%.role.remove.owner" # Only a member of role owner can remove the role 'owner' from other players.
      - "shyguild.guild.%shyguild_guild_name%.role.add.member" # Only a member of role owner can assign the role 'member' to other players.
      - "shyguild.guild.%shyguild_guild_name%.role.remove.member" # Only a member of role owner can remove the role 'member' from other players.
      - "shyguild.guild.%shyguild_guild_name%.role.list" # Allows to list all roles.
      - "shyguild.guild.%shyguild_guild_name%.member.remove" # Only a member of role owner can remove a player from the guild.
      - "shyguild.guild.%shyguild_guild_name%.member.list" # Allows to list all members of the guild.
      - "shyguild.guild.%shyguild_guild_name%.invite" # Only a member of role owner can send out invites for this guild.
      - "shyguild.guild.%shyguild_guild_name%.leave" # Players should be able to leave the guild on their own.
    # Permissions that are denied to players with this role. Permissions require the plugin LuckPerms to be installed.
    denyPermissions: [ ]
  - name: "member"
    allowPermissions:
      - "shyguild.guild.%shyguild_guild_name%.role.list" # Allows to list all roles.
      - "shyguild.guild.%shyguild_guild_name%.member.list" # Allows to list all members of the guild.
      - "shyguild.guild.%shyguild_guild_name%.leave" # Players should be able to leave the guild on their own.
    denyPermissions: [ ]